name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v1.2.0)'
        required: true
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: write

    steps:
      - name: Validate version format
        run: |
          if ! echo "${{ inputs.version }}" | grep -qE '^v?(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$'; then
            echo "Error: version must be a SemVer core version in X.Y.Z or vX.Y.Z format without leading zeroes (got: ${{ inputs.version }})"
            exit 1
          fi

      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check if tag already exists
        id: check_tag
        run: |
          TAG="${{ inputs.version }}"
          # Normalize: ensure tag always has a v prefix
          [[ "$TAG" == v* ]] || TAG="v$TAG"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git ls-remote --tags origin "refs/tags/$TAG" | grep -q "refs/tags/$TAG$"; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Tag $TAG already exists, skipping."
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Extract release notes from CHANGELOG.md
        if: steps.check_tag.outputs.exists == 'false'
        id: notes
        run: |
          TAG="${{ steps.check_tag.outputs.tag }}"
          VERSION="${TAG#v}"
          # Extract the section for the given version from CHANGELOG.md
          NOTES=$(awk "/^## \[$VERSION\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release $VERSION"
          fi
          # Write to a file to avoid quoting issues
          echo "$NOTES" > /tmp/release_notes.md
          echo "See CHANGELOG.md for full details." >> /tmp/release_notes.md

      - name: Set up JDK 17
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        if: steps.check_tag.outputs.exists == 'false'
        run: chmod +x gradlew

      - name: Decode keystore
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          umask 077
          # Expected secrets are generated by .github/workflows/generate-keystore.yml
          printf '%s' "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | tr -d '\r' | base64 -d > /tmp/release.keystore
          chmod 600 /tmp/release.keystore

      - name: Verify release keystore
        if: steps.check_tag.outputs.exists == 'false'
        run: |
          keytool -list -v \
            -keystore /tmp/release.keystore \
            -storepass '${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' >/dev/null

      - name: Build release APK
        if: steps.check_tag.outputs.exists == 'false'
        env:
          SIGNING_STORE_FILE: /tmp/release.keystore
          SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create tag and GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.check_tag.outputs.tag }}"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" \
            --title "$TAG" \
            --notes-file /tmp/release_notes.md \
            --target main \
            app/build/outputs/apk/release/app-release.apk
