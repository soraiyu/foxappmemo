IssueTracker: https://github.com/soraiyu/foxappmemo/issues

Summary: Track, rate, and tag your Android apps with memos. No internet required.

Description: |-
  FoxAppMemo is a fully offline app manager and memo tool. Browse your installed
  apps or enter any package name manually, then keep personal notes alongside a
  simple three-level rating, a status label, and free-form tags.

  Features:

  * Browse installed apps directly from the app and add them to your list in one tap
  * Rich memos – attach a free-text note to any app
  * Simple ratings – 自分向きじゃない / ふつう / 好き (Not for me / Normal / Like)
  * App genre auto-detected from the OS and pre-filled as a tag
  * Status labels – Trying / Main / Avoid / Blacklist / Reconsider
  * Tag system – create tags on the fly and filter by multiple tags at once
  * Powerful filters – search by name or package, filter by status, tags, and specific rating values
  * Export your full memo list as pretty-printed JSON via the Storage Access Framework (you choose the save location)
  * Swipe-to-delete with confirmation dialog
  * Material You / Material 3 design with a warm fox-inspired colour palette

  Privacy:

  * No internet permission – the app never makes any network requests
  * All data is stored locally in a Room (SQLite) database on your device
  * The only permissions used are QUERY_ALL_PACKAGES (to list installed apps) and the implicit storage access granted by the system file-picker when you choose to export

